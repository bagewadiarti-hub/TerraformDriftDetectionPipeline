schedules:
  - cron: '0 2 * * *'
    displayName: Nightly Drift Detection
    branches:
      include:
        - main
    always: true

trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  - name: ARM_CLIENT_ID
    value: $(azure-client-id)
  - name: ARM_CLIENT_SECRET
    value: $(azure-client-secret)
  - name: ARM_TENANT_ID
    value: $(azure-tenant-id)
  - name: ARM_SUBSCRIPTION_ID
    value: $(azure-subscription-id)

steps:
  - task: TerraformInstaller@0
    inputs:
      terraformVersion: 'latest'

  - script: terraform init
    displayName: Terraform Init
    env:
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  - script: |
      terraform plan -detailed-exitcode -out=tfplan.out 2>&1 | tee plan_output.txt
      echo "##vso[task.setvariable variable=TF_EXIT_CODE]$?"
    displayName: Terraform Plan
    continueOnError: true
    env:
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  - script: terraform show -no-color tfplan.out > plan_readable.txt
    displayName: Convert Plan to Readable
    condition: eq(variables['TF_EXIT_CODE'], '2')

  - task: PublishBuildArtifacts@1
    condition: eq(variables['TF_EXIT_CODE'], '2')
    inputs:
      pathToPublish: plan_readable.txt
      artifactName: drift-plan-output
